[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "image2ppt-exact"
version = "0.1.0"
description = "Reproducible image-to-SVG-wrapper-to-PPTX pipeline for pixel-exact Image2PPT decks."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Ultimate PPT" }]
dependencies = [
  "python-pptx>=0.6.23"
]

[project.optional-dependencies]
ocr = [
  "paddleocr>=2.7.0"
]

[project.scripts]
image2ppt-exact = "image2ppt_exact.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
