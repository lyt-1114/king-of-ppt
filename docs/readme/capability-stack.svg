<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT capability stack</title>
  <desc id="desc">Black tech layered stack showing bitmap, editable, and verification layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520">
      <stop stop-color="#020403"/>
      <stop offset="0.56" stop-color="#07110F"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A1714"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-26%" width="136%" height="165%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.44"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <text x="72" y="78" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Hybrid Deck Stack</text>
  <text x="72" y="112" fill="#65D9FF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="2">PREMIUM VISUALS WITHOUT LOSING EDITABILITY</text>

  <g transform="translate(116 156)" filter="url(#shadow)">
    <path d="M160 204L514 92L742 190L386 322L160 204Z" fill="#07110F" stroke="#285BFF"/>
    <path d="M106 154L460 42L688 140L332 272L106 154Z" fill="url(#plate)"/>
    <path d="M200 128L356 82" stroke="#00F5A0" stroke-width="12" stroke-linecap="round"/>
    <path d="M220 168L504 82" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round"/>
    <path d="M248 206L534 118" stroke="#2D7DFF" stroke-width="8" stroke-linecap="round"/>
    <path d="M294 236L478 178" stroke="#FF2E63" stroke-width="8" stroke-linecap="round"/>
    <path d="M450 42L450 0" stroke="#00F5A0" stroke-width="2" opacity="0.7"/>
    <circle cx="450" cy="-5" r="6" fill="#00F5A0" filter="url(#glow)"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(838 164)">
      <rect width="300" height="66" rx="18" fill="#0A1714" stroke="#285BFF"/>
      <text x="26" y="42" fill="#FF2E63" font-size="20" font-weight="900">Bitmap atmosphere</text>
    </g>
    <g transform="translate(838 252)">
      <rect width="300" height="66" rx="18" fill="#0A1714" stroke="#00A86B"/>
      <text x="26" y="42" fill="#FFFFFF" font-size="20" font-weight="900">Editable business layer</text>
    </g>
    <g transform="translate(838 340)">
      <rect width="300" height="66" rx="18" fill="#0A1714" stroke="#285BFF"/>
      <text x="26" y="42" fill="#FF2E63" font-size="20" font-weight="900">Verification layer</text>
    </g>
  </g>
</svg>
