<svg width="1280" height="390" viewBox="0 0 1280 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thin PPT skill versus Ultimate PPT</title>
  <desc id="desc">Dark technology comparison showing Ultimate PPT as deeper than thin PPT skills.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="390">
      <stop stop-color="#050908"/>
      <stop offset="1" stop-color="#162B26"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-16%" width="120%" height="142%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="390" rx="26" fill="url(#bg)"/>
  <text x="62" y="64" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900">The difference is depth.</text>
  <text x="62" y="96" fill="#BFE5DA" font-family="Arial, Helvetica, sans-serif" font-size="17">Simple generation is one step. Ultimate PPT adds decisions before and checks after.</text>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g transform="translate(76 138)">
      <rect width="500" height="190" rx="18" fill="#F7EFE2"/>
      <text x="32" y="48" fill="#8E4D3A" font-size="24" font-weight="900">Thin PPT Skill</text>
      <text x="32" y="98" fill="#10201C" font-size="20" font-weight="800">Prompt → Template → Export</text>
      <text x="32" y="140" fill="#6C6154" font-size="16">Fast, but shallow for serious decks.</text>
    </g>

    <g transform="translate(704 118)">
      <rect width="500" height="230" rx="18" fill="#10201C" stroke="#2C5F53"/>
      <text x="32" y="50" fill="#F2B35D" font-size="24" font-weight="900">Ultimate PPT</text>
      <text x="32" y="98" fill="#FFFFFF" font-size="20" font-weight="800">Source → Grammar → Lock</text>
      <text x="32" y="138" fill="#FFFFFF" font-size="20" font-weight="800">Showcase → Output → Audit</text>
      <text x="32" y="184" fill="#BFE5DA" font-size="16">Strategic, editable, visual, verified.</text>
    </g>
  </g>
</svg>
