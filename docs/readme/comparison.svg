<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thin PPT skill versus Ultimate PPT</title>
  <desc id="desc">Black tech comparison between a thin PPT skill and Ultimate PPT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440">
      <stop stop-color="#020403"/>
      <stop offset="0.55" stop-color="#07110F"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <filter id="shadow" x="-14%" y="-20%" width="128%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1280" height="440" rx="30" fill="url(#bg)"/>
  <text x="72" y="78" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Depth beats decoration</text>
  <text x="72" y="112" fill="#65D9FF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="2">THIN GENERATION VS PRESENTATION SYSTEM</text>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g transform="translate(88 164)">
      <rect width="480" height="190" rx="20" fill="#0A1714" stroke="#285BFF"/>
      <text x="34" y="52" fill="#65D9FF" font-size="26" font-weight="900">Thin PPT Skill</text>
      <text x="34" y="102" fill="#FFFFFF" font-size="22" font-weight="900">Prompt -> Template -> Export</text>
      <text x="34" y="148" fill="#A7FCE0" font-size="17">Fast, but shallow for serious decks.</text>
    </g>

    <g transform="translate(710 138)">
      <rect width="480" height="242" rx="20" fill="#0A1714" stroke="#285BFF"/>
      <text x="34" y="56" fill="#FF2E63" font-size="26" font-weight="900">Ultimate PPT</text>
      <text x="34" y="106" fill="#FFFFFF" font-size="22" font-weight="900">Source -> Grammar -> Lock</text>
      <text x="34" y="150" fill="#FFFFFF" font-size="22" font-weight="900">Showcase -> Output -> Audit</text>
      <text x="34" y="198" fill="#A7FCE0" font-size="17">Strategic, editable, visual, verified.</text>
    </g>
  </g>
</svg>
