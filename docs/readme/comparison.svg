<svg width="1280" height="390" viewBox="0 0 1280 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Thin PPT skill versus Ultimate PPT</title>
  <desc id="desc">A calm comparison between thin PPT skills and Ultimate PPT.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#10201C" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="1278" height="388" rx="22" fill="#FBF8F1" stroke="#E3D5C2"/>
  <text x="54" y="58" fill="#10201C" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900">The difference is not style. It is depth.</text>
  <text x="54" y="88" fill="#6C6154" font-family="Arial, Helvetica, sans-serif" font-size="16">Simple deck generation is one step. Ultimate PPT adds decisions before and checks after.</text>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g transform="translate(68 128)">
      <rect width="520" height="204" rx="18" fill="#FFFFFF" stroke="#E3D5C2"/>
      <text x="30" y="42" fill="#8E4D3A" font-size="22" font-weight="900">Thin PPT skill</text>
      <text x="30" y="82" fill="#6C6154" font-size="16">Prompt</text>
      <text x="30" y="118" fill="#6C6154" font-size="16">Template</text>
      <text x="30" y="154" fill="#6C6154" font-size="16">Export</text>
      <text x="30" y="184" fill="#9A8B78" font-size="14">Fast, useful, but shallow for serious decks.</text>
      <rect x="286" y="68" width="168" height="92" rx="12" fill="#F0E6D8"/>
      <rect x="306" y="88" width="90" height="10" rx="5" fill="#B8AA95"/>
      <rect x="306" y="116" width="112" height="8" rx="4" fill="#C8BBA8"/>
      <rect x="306" y="136" width="78" height="8" rx="4" fill="#C8BBA8"/>
    </g>

    <g transform="translate(692 108)">
      <rect width="520" height="244" rx="18" fill="#10201C"/>
      <text x="30" y="44" fill="#F3B35D" font-size="22" font-weight="900">Ultimate PPT</text>
      <text x="30" y="84" fill="#E8DDCC" font-size="16">Source brief and audience goal</text>
      <text x="30" y="116" fill="#E8DDCC" font-size="16">Image2 visual grammar</text>
      <text x="30" y="148" fill="#E8DDCC" font-size="16">Strategy lock and execution lock</text>
      <text x="30" y="180" fill="#E8DDCC" font-size="16">Two-page proof before bulk work</text>
      <text x="30" y="212" fill="#E8DDCC" font-size="16">Editable output plus audit evidence</text>
      <rect x="350" y="72" width="112" height="112" rx="14" fill="#F8F0E3"/>
      <rect x="370" y="94" width="62" height="9" rx="4.5" fill="#0F766E"/>
      <rect x="370" y="120" width="72" height="40" rx="8" fill="#D99A3D"/>
      <rect x="370" y="176" width="70" height="7" rx="3.5" fill="#B8AA95"/>
    </g>
  </g>
</svg>
