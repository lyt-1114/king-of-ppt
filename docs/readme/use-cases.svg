      <text x="24" y="78" fill="#65D9FF" font-size="14">proof and decision</text>
    </g>
    <g transform="translate(948 160)">
      <rect width="248" height="116" rx="18" fill="#0A1714" stroke="#285BFF"/>
      <text x="24" y="48" fill="#FF2E63" font-size="21" font-weight="900">Technical Report</text>
      <text x="24" y="78" fill="#A7FCE0" font-size="14">systems and cases</text>
