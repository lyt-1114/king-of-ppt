  </defs>
  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <text x="72" y="78" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Built For High-Stakes Deck Work</text>
  <text x="72" y="112" fill="#65D9FF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="2">NOT JUST ONE PPT SCENARIO</text>

