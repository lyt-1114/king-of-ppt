    <rect x="28" y="146" width="88" height="34" rx="9" fill="#10201C"/>
    <rect x="132" y="146" width="88" height="34" rx="9" fill="#D99A3D"/>
    <rect x="236" y="146" width="76" height="34" rx="9" fill="#E9DDCA"/>
  </g>
  <g transform="translate(922 222)" filter="url(#soft)">
