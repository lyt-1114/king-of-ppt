    <text x="24" y="30" fill="#F7EFE2" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800">AUDITED OUTPUT</text>
    <text x="24" y="52" fill="#BFD8CF" font-family="Arial, Helvetica, sans-serif" font-size="13">editable, readable, verified</text>
  </g>

  <text x="70" y="86" fill="#0F766E" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" letter-spacing="3">ULTIMATE PPT</text>
  <text x="70" y="150" fill="#10201C" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900">Image2PPT-first</text>
  <text x="70" y="206" fill="#10201C" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="900">presentation system</text>
  <text x="72" y="252" fill="#5E5347" font-family="Arial, Helvetica, sans-serif" font-size="20">Reference image to editable deck grammar, not screenshot stacks.</text>
