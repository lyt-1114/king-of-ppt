<svg width="1280" height="380" viewBox="0 0 1280 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT</title>
  <desc id="desc">A calm README hero for Ultimate PPT, an Image2PPT-first presentation system.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1280" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F1"/>
      <stop offset="1" stop-color="#EFE3D0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#D99A3D"/>
    </linearGradient>
    <filter id="soft" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#10201C" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="1278" height="378" rx="24" fill="url(#paper)" stroke="#E3D5C2"/>
  <path d="M64 295C210 219 320 238 456 185C592 132 698 80 861 108C1011 134 1085 202 1212 145" stroke="#0F766E" stroke-width="2" opacity="0.24"/>
  <path d="M64 324C240 243 352 273 508 220C664 167 747 137 904 166C1055 194 1128 233 1212 203" stroke="#D99A3D" stroke-width="2" opacity="0.22"/>

  <g transform="translate(760 72)" filter="url(#soft)">
    <rect width="360" height="204" rx="18" fill="#FFFFFF" stroke="#DED1BD"/>
    <rect x="28" y="28" width="108" height="12" rx="6" fill="#0F766E"/>
    <rect x="28" y="58" width="226" height="18" rx="9" fill="#10201C"/>
