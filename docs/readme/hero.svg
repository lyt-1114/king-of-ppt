<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT</title>
  <desc id="desc">Dark technology hero for Ultimate PPT, an Image2PPT-first presentation system.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050908"/>
      <stop offset="0.48" stop-color="#0D1916"/>
      <stop offset="1" stop-color="#182D28"/>
    </linearGradient>
    <linearGradient id="line" x1="82" y1="58" x2="1194" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#21D7B2"/>
      <stop offset="0.45" stop-color="#F2B35D"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="440" rx="28" fill="url(#bg)"/>
  <circle cx="310" cy="150" r="180" fill="#0F766E" opacity="0.23" filter="url(#glow)"/>
  <circle cx="1000" cy="282" r="210" fill="#D99A3D" opacity="0.18" filter="url(#glow)"/>

  <g opacity="0.16">
    <path d="M76 92H1204" stroke="#E8FFF8"/>
    <path d="M76 176H1204" stroke="#E8FFF8"/>
    <path d="M76 260H1204" stroke="#E8FFF8"/>
    <path d="M76 344H1204" stroke="#E8FFF8"/>
    <path d="M220 56V384" stroke="#E8FFF8"/>
    <path d="M412 56V384" stroke="#E8FFF8"/>
    <path d="M604 56V384" stroke="#E8FFF8"/>
    <path d="M796 56V384" stroke="#E8FFF8"/>
    <path d="M988 56V384" stroke="#E8FFF8"/>
  </g>

  <path d="M72 314C236 216 382 244 528 176C674 108 798 72 946 106C1084 138 1144 204 1212 166" stroke="url(#line)" stroke-width="2.8" opacity="0.9"/>
  <path d="M72 348C264 238 398 284 560 224C722 164 812 148 966 184C1098 214 1160 246 1212 226" stroke="#D8FFF4" stroke-width="1.2" opacity="0.25"/>

  <text x="78" y="90" fill="#D8FFF4" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" letter-spacing="4">ULTIMATE PPT</text>
  <text x="78" y="158" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="900">Image2PPT-first</text>
  <text x="78" y="226" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="900">presentation system</text>
  <text x="80" y="276" fill="#BFE5DA" font-family="Arial, Helvetica, sans-serif" font-size="21">Reference images become editable, verified deck grammar.</text>

  <g transform="translate(80 318)">
    <rect width="120" height="38" rx="19" fill="#0F766E"/>
    <text x="60" y="25" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900">IMAGE2</text>
    <rect x="134" width="136" height="38" rx="19" fill="#F2B35D"/>
    <text x="202" y="25" text-anchor="middle" fill="#0B1513" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900">EDITABLE</text>
    <rect x="284" width="126" height="38" rx="19" fill="#F5EFE4"/>
    <text x="347" y="25" text-anchor="middle" fill="#0B1513" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="900">VERIFIED</text>
  </g>

  <g transform="translate(790 92)" filter="url(#shadow)">
    <rect width="330" height="214" rx="18" fill="#F7EFE2"/>
    <rect x="26" y="26" width="100" height="12" rx="6" fill="#0F766E"/>
    <rect x="26" y="58" width="222" height="18" rx="9" fill="#10201C"/>
    <rect x="26" y="96" width="278" height="10" rx="5" fill="#9E927D"/>
    <rect x="26" y="120" width="230" height="10" rx="5" fill="#B8AA95"/>
    <rect x="26" y="158" width="82" height="34" rx="10" fill="#10201C"/>
    <rect x="124" y="158" width="82" height="34" rx="10" fill="#D99A3D"/>
    <rect x="222" y="158" width="82" height="34" rx="10" fill="#E4D6C1"/>
  </g>

  <g transform="translate(938 292)" filter="url(#shadow)">
    <rect width="214" height="64" rx="16" fill="#10201C" stroke="#2C5F53"/>
    <text x="24" y="28" fill="#F7EFE2" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">AUDIT READY</text>
    <text x="24" y="48" fill="#BFE5DA" font-family="Arial, Helvetica, sans-serif" font-size="12">layout + image2 evidence</text>
  </g>
</svg>
