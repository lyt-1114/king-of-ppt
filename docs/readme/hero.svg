<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT hero</title>
  <desc id="desc">Black tech hero graphic for Ultimate PPT, an Image2PPT-first presentation system.</desc>
  <defs>
    <radialGradient id="orbA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(282 154) rotate(39) scale(320)">
      <stop stop-color="#00F5A0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#00F5A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(972 338) rotate(39) scale(360)">
      <stop stop-color="#2D7DFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2D7DFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520">
      <stop stop-color="#020403"/>
      <stop offset="0.5" stop-color="#07110F"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <linearGradient id="scan" x1="80" y1="82" x2="1200" y2="390">
      <stop stop-color="#00F5A0"/>
      <stop offset="0.45" stop-color="#2D7DFF"/>
      <stop offset="0.78" stop-color="#FF2E63"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="deck" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0A1714"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="520" rx="30" fill="url(#orbA)"/>
  <rect width="1280" height="520" rx="30" fill="url(#orbB)"/>

  <g opacity="0.13">
    <path d="M72 98H1208" stroke="#B8F7FF"/>
    <path d="M72 184H1208" stroke="#B8F7FF"/>
    <path d="M72 270H1208" stroke="#B8F7FF"/>
    <path d="M72 356H1208" stroke="#B8F7FF"/>
    <path d="M230 58V454" stroke="#B8F7FF"/>
    <path d="M434 58V454" stroke="#B8F7FF"/>
    <path d="M638 58V454" stroke="#B8F7FF"/>
    <path d="M842 58V454" stroke="#B8F7FF"/>
    <path d="M1046 58V454" stroke="#B8F7FF"/>
  </g>

  <path d="M72 374C214 270 376 292 530 216C684 140 800 96 958 132C1104 166 1176 228 1212 184" stroke="url(#scan)" stroke-width="3" opacity="0.92" filter="url(#glow)"/>
  <path d="M72 410C266 294 402 330 578 270C754 210 860 202 1002 238C1124 268 1182 292 1212 272" stroke="#B8F7FF" stroke-width="1.2" opacity="0.26"/>

  <g transform="translate(800 110)" filter="url(#shadow)">
    <path d="M0 152L250 80L388 156L136 236L0 152Z" fill="#0A1714" stroke="#2B7A69"/>
    <path d="M42 120L246 62L350 121L144 185L42 120Z" fill="url(#deck)"/>
    <path d="M76 108L158 86" stroke="#00F5A0" stroke-width="8" stroke-linecap="round"/>
    <path d="M88 136L252 91" stroke="#10201C" stroke-width="10" stroke-linecap="round"/>
    <path d="M122 160L282 116" stroke="#2D7DFF" stroke-width="6" stroke-linecap="round"/>
    <path d="M150 178L262 146" stroke="#FF2E63" stroke-width="6" stroke-linecap="round"/>
    <path d="M44 168L146 200" stroke="#2D7DFF" stroke-width="2" opacity="0.75"/>
    <path d="M246 64L246 26" stroke="#FF2E63" stroke-width="2" opacity="0.75"/>
    <circle cx="246" cy="22" r="5" fill="#FF2E63"/>
    <circle cx="44" cy="168" r="5" fill="#2D7DFF"/>
  </g>

  <text x="78" y="96" fill="#B8F7FF" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="800" letter-spacing="4">ULTIMATE PPT</text>
  <text x="78" y="170" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="900">Image2PPT OS</text>
  <text x="78" y="238" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="900">for serious decks</text>
  <text x="80" y="294" fill="#B8EEE0" font-family="Arial, Helvetica, sans-serif" font-size="22">Reference image -> editable deck grammar -> audited output.</text>

  <g transform="translate(80 338)" font-family="Arial, Helvetica, sans-serif">
    <rect width="112" height="38" rx="19" fill="#00A86B"/>
    <text x="56" y="25" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900">IMAGE2</text>
    <rect x="128" width="128" height="38" rx="19" fill="#2D7DFF"/>
    <text x="192" y="25" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900">EDITABLE</text>
    <rect x="272" width="118" height="38" rx="19" fill="#FF2E63"/>
    <text x="331" y="25" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="900">AUDITED</text>
  </g>
</svg>
