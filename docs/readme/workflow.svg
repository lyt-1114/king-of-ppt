<svg width="1280" height="350" viewBox="0 0 1280 350" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Image2PPT workflow</title>
  <desc id="desc">A high-contrast but integrated workflow diagram from reference to grammar, lock, showcase, output, and audit.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-14%" width="120%" height="136%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10201C" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect x="1" y="1" width="1278" height="348" rx="22" fill="#FBF8F1" stroke="#E3D5C2"/>
  <rect x="34" y="28" width="1212" height="294" rx="22" fill="#F4EBDC" stroke="#E2D3BF"/>
  <text x="62" y="68" fill="#10201C" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="900">Image2PPT: from visual reference to delivery system</text>
  <text x="62" y="98" fill="#6C6154" font-family="Arial, Helvetica, sans-serif" font-size="16">The workflow exists to prevent beautiful but uneditable screenshot decks.</text>

  <g transform="translate(54 142)" font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g>
      <rect width="178" height="118" rx="16" fill="#10201C"/>
      <text x="22" y="34" fill="#F3B35D" font-size="13" font-weight="900">01</text>
      <text x="22" y="62" fill="#FFFFFF" font-size="19" font-weight="900">Reference</text>
      <text x="22" y="88" fill="#BFD8CF" font-size="13">image, PDF, site, old PPT</text>
    </g>
    <g transform="translate(210 0)">
      <rect width="178" height="118" rx="16" fill="#FFFFFF" stroke="#E3D5C2"/>
      <text x="22" y="34" fill="#0F766E" font-size="13" font-weight="900">02</text>
      <text x="22" y="62" fill="#10201C" font-size="19" font-weight="900">Extract</text>
      <text x="22" y="88" fill="#6C6154" font-size="13">palette, type, grid, image role</text>
    </g>
    <g transform="translate(420 0)">
      <rect width="178" height="118" rx="16" fill="#FFFFFF" stroke="#E3D5C2"/>
      <text x="22" y="34" fill="#0F766E" font-size="13" font-weight="900">03</text>
      <text x="22" y="62" fill="#10201C" font-size="19" font-weight="900">Lock</text>
      <text x="22" y="88" fill="#6C6154" font-size="13">strategy and execution rules</text>
    </g>
    <g transform="translate(630 0)">
      <rect width="178" height="118" rx="16" fill="#10201C"/>
      <text x="22" y="34" fill="#F3B35D" font-size="13" font-weight="900">04</text>
      <text x="22" y="62" fill="#FFFFFF" font-size="19" font-weight="900">Showcase</text>
      <text x="22" y="88" fill="#BFD8CF" font-size="13">cover plus dense proof page</text>
    </g>
    <g transform="translate(840 0)">
      <rect width="178" height="118" rx="16" fill="#FFFFFF" stroke="#E3D5C2"/>
      <text x="22" y="34" fill="#0F766E" font-size="13" font-weight="900">05</text>
      <text x="22" y="62" fill="#10201C" font-size="19" font-weight="900">Produce</text>
      <text x="22" y="88" fill="#6C6154" font-size="13">PPTX, HTML, PDF, hybrid</text>
    </g>
    <g transform="translate(1050 0)">
      <rect width="178" height="118" rx="16" fill="#10201C"/>
      <text x="22" y="34" fill="#F3B35D" font-size="13" font-weight="900">06</text>
      <text x="22" y="62" fill="#FFFFFF" font-size="19" font-weight="900">Audit</text>
      <text x="22" y="88" fill="#BFD8CF" font-size="13">layout, sources, image2 evidence</text>
    </g>
  </g>

  <g stroke="#0F766E" stroke-width="2.4" stroke-linecap="round" opacity="0.68">
    <path d="M242 201H264"/>
    <path d="M452 201H474"/>
    <path d="M662 201H684"/>
    <path d="M872 201H894"/>
    <path d="M1082 201H1104"/>
  </g>
</svg>
