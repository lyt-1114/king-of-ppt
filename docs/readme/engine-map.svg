<svg width="1280" height="390" viewBox="0 0 1280 390" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT engine map</title>
  <desc id="desc">Dark technology engine map for Ultimate PPT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="390">
      <stop stop-color="#050908"/>
      <stop offset="1" stop-color="#162B26"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F766E"/>
      <stop offset="1" stop-color="#F2B35D"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="390" rx="26" fill="url(#bg)"/>
  <text x="62" y="64" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="900">One Skill. Multiple Engines.</text>
  <text x="62" y="96" fill="#BFE5DA" font-family="Arial, Helvetica, sans-serif" font-size="17">Image2PPT is the core. The surrounding engines keep the deck strategic, editable, and verified.</text>

  <g stroke="#D8FFF4" stroke-width="2" opacity="0.25">
    <path d="M640 214H288"/>
    <path d="M640 214H992"/>
    <path d="M640 214L430 316"/>
    <path d="M640 214L850 316"/>
    <path d="M640 214L430 130"/>
    <path d="M640 214L850 130"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="640" cy="214" r="82" fill="url(#core)"/>
    <text x="640" y="207" text-anchor="middle" fill="#07110F" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="900">IMAGE2PPT</text>
    <text x="640" y="236" text-anchor="middle" fill="#07110F" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800">CORE</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(92 170)">
      <rect width="232" height="76" rx="16" fill="#F7EFE2"/>
      <text x="26" y="47" fill="#10201C" font-size="19" font-weight="900">Strategy</text>
    </g>
    <g transform="translate(300 90)">
      <rect width="232" height="76" rx="16" fill="#10201C" stroke="#2C5F53"/>
      <text x="26" y="47" fill="#F2B35D" font-size="19" font-weight="900">Visual Grammar</text>
    </g>
    <g transform="translate(300 300)">
      <rect width="232" height="76" rx="16" fill="#F7EFE2"/>
      <text x="26" y="47" fill="#10201C" font-size="19" font-weight="900">HTML Preview</text>
    </g>
    <g transform="translate(748 90)">
      <rect width="232" height="76" rx="16" fill="#F7EFE2"/>
      <text x="26" y="47" fill="#10201C" font-size="19" font-weight="900">Editable PPTX</text>
    </g>
    <g transform="translate(748 300)">
      <rect width="232" height="76" rx="16" fill="#F7EFE2"/>
      <text x="26" y="47" fill="#10201C" font-size="19" font-weight="900">Presenter</text>
    </g>
    <g transform="translate(956 170)">
      <rect width="232" height="76" rx="16" fill="#10201C" stroke="#2C5F53"/>
      <text x="26" y="47" fill="#F2B35D" font-size="19" font-weight="900">Audit</text>
    </g>
  </g>
</svg>
