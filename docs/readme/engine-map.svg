<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate PPT engine map</title>
  <desc id="desc">Black tech engine map for Ultimate PPT.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520">
      <stop stop-color="#020403"/>
      <stop offset="0.52" stop-color="#07110F"/>
      <stop offset="1" stop-color="#10251F"/>
    </linearGradient>
    <linearGradient id="core" x1="560" y1="170" x2="720" y2="330">
      <stop stop-color="#22FFD2"/>
      <stop offset="1" stop-color="#FFB84D"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="30" fill="url(#bg)"/>
  <circle cx="640" cy="270" r="205" fill="#0F766E" opacity="0.08" filter="url(#glow)"/>
  <circle cx="640" cy="270" r="134" stroke="#22FFD2" stroke-opacity="0.24" stroke-width="2"/>
  <circle cx="640" cy="270" r="206" stroke="#FFB84D" stroke-opacity="0.18" stroke-width="2"/>
  <text x="72" y="78" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900">Multi-Engine Architecture</text>
  <text x="72" y="112" fill="#9FEADA" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="800" letter-spacing="2">NOT A SINGLE TEMPLATE PATH</text>

  <g stroke="#D7FFF5" stroke-width="2" opacity="0.26">
    <path d="M640 270H292"/>
    <path d="M640 270H988"/>
    <path d="M640 270L420 172"/>
    <path d="M640 270L860 172"/>
    <path d="M640 270L420 368"/>
    <path d="M640 270L860 368"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="640" cy="270" r="86" fill="url(#core)"/>
    <text x="640" y="263" text-anchor="middle" fill="#020403" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="900">IMAGE2PPT</text>
    <text x="640" y="293" text-anchor="middle" fill="#020403" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="900">ROUTER</text>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <g transform="translate(96 232)">
      <rect width="230" height="78" rx="16" fill="#F6EFE4"/>
      <text x="30" y="49" fill="#07110F" font-size="22" font-weight="900">Strategy</text>
    </g>
    <g transform="translate(320 132)">
      <rect width="230" height="78" rx="16" fill="#0A1714" stroke="#2F7C6C"/>
      <text x="30" y="49" fill="#FFB84D" font-size="22" font-weight="900">Grammar</text>
    </g>
    <g transform="translate(320 398)">
      <rect width="230" height="78" rx="16" fill="#F6EFE4"/>
      <text x="30" y="49" fill="#07110F" font-size="22" font-weight="900">HTML</text>
    </g>
    <g transform="translate(730 132)">
      <rect width="230" height="78" rx="16" fill="#F6EFE4"/>
      <text x="30" y="49" fill="#07110F" font-size="22" font-weight="900">PPTX</text>
    </g>
    <g transform="translate(730 398)">
      <rect width="230" height="78" rx="16" fill="#F6EFE4"/>
      <text x="30" y="49" fill="#07110F" font-size="22" font-weight="900">Presenter</text>
    </g>
    <g transform="translate(954 232)">
      <rect width="230" height="78" rx="16" fill="#0A1714" stroke="#2F7C6C"/>
      <text x="30" y="49" fill="#FFB84D" font-size="22" font-weight="900">Audit</text>
    </g>
  </g>
</svg>
